<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediConnect – Buscar</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .buscar-header {
      background: var(--white);
      padding: 52px 20px 16px;
      border-bottom: 1px solid var(--gray-100);
      position: sticky; top: 0; z-index: 50;
    }
    .buscar-header h1 { font-family: var(--font-title); font-size: 22px; font-weight: 700; color: var(--gray-800); margin-bottom: 12px; }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: 12px;
      padding: 0 14px;
      gap: 10px;
    }
    .search-bar input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 15px;
      font-family: var(--font-main);
      color: var(--gray-800);
      padding: 13px 0;
    }
    .search-bar input::placeholder { color: var(--gray-400); }
    .search-bar svg { color: var(--gray-400); width: 18px; height: 18px; flex-shrink: 0; }

    .filter-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px 20px;
      scrollbar-width: none;
    }
    .filter-chips::-webkit-scrollbar { display: none; }

    .chip {
      border: 1.5px solid var(--gray-200);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-main);
      color: var(--gray-600);
      background: var(--white);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .results-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }

    .med-card-full {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-100);
    }
    .med-card-full .med-img { width: 68px; height: 68px; border-radius: 12px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; overflow: hidden; }
    .med-card-full .med-info { flex: 1; min-width: 0; }
    .med-card-full .med-info h3 { font-size: 15px; font-weight: 700; color: var(--gray-800); }
    .med-card-full .med-info p { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
    .med-card-full .med-qty { font-size: 13px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .med-card-full .med-location { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--gray-600); margin-top: 4px; }

    .btn-detail {
      background: var(--gray-800);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-detail:hover { background: var(--primary); }

    .empty-state { text-align: center; padding: 48px 20px; color: var(--gray-400); }
    .empty-state div { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; font-weight: 600; }
    .empty-state span { font-size: 13px; }

    /* Detail Modal */
    .detail-modal { text-align: left; }
    .detail-modal .dm-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .detail-modal .dm-icon { width: 58px; height: 58px; background: var(--primary-light); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
    .detail-modal h2 { font-size: 18px; font-weight: 800; color: var(--gray-800); font-family: var(--font-title); }
    .detail-modal .dm-type { font-size: 13px; color: var(--gray-400); margin-top: 2px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gray-100); font-size: 14px; }
    .detail-row:last-of-type { border-bottom: none; }
    .detail-row span:first-child { color: var(--gray-400); font-weight: 600; }
    .detail-row span:last-child { color: var(--gray-800); font-weight: 700; }
    .dm-actions { display: flex; gap: 10px; margin-top: 18px; }
  </style>
</head>
<body>
<div class="page">
  <!-- Header -->
  <div class="buscar-header">
    <h1>Buscar Medicamentos</h1>
    <div class="search-bar">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/></svg>
      <input type="text" id="searchInput" placeholder="¿Qué necesitas hoy?" oninput="filterMeds()"/>
    </div>
  </div>

  <!-- Filter chips -->
  <div class="filter-chips">
    <button class="chip active" onclick="setFilter(this,'Todos')">Todos</button>
    <button class="chip" onclick="setFilter(this,'Antibiótico')">Antibiótico</button>
    <button class="chip" onclick="setFilter(this,'Antiinflamatorio')">Antiinflamatorio</button>
    <button class="chip" onclick="setFilter(this,'Antidiabético')">Antidiabético</button>
    <button class="chip" onclick="setFilter(this,'Analgésico')">Analgésico</button>
    <button class="chip" onclick="setFilter(this,'Vitamina')">Vitamina</button>
  </div>

  <!-- Results -->
  <div class="results-list" id="resultsList"></div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
    Inicio
  </a>
  <a href="buscar.html" class="nav-item active">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/></svg>
    Buscar
  </a>
  <button class="nav-btn-center" onclick="location.href='donar.html'">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
  </button>
  <a href="perfil.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
    Perfil
  </a>
</nav>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailOverlay">
  <div class="modal detail-modal" id="detailModal"></div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
<script>
  const MEDICINE_EMOJIS = {'Antibiótico':'💊','Antiinflamatorio':'🩹','Antidiabético':'💉','Analgésico':'🔴','Vitamina':'🍋','default':'💊'};
  let allDonations = [];
  let currentFilter = 'Todos';

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function setFilter(el, filter) {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentFilter = filter;
    filterMeds();
  }

  function filterMeds() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allDonations.filter(d => d.estado !== 'entregado');
    if (currentFilter !== 'Todos') filtered = filtered.filter(d => d.tipo === currentFilter);
    if (q) filtered = filtered.filter(d => d.nombre.toLowerCase().includes(q) || d.tipo.toLowerCase().includes(q));
    renderList(filtered);
  }

  function renderList(list) {
    const el = document.getElementById('resultsList');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><div>🔍</div><p>No se encontraron medicamentos</p><span>Intenta con otro término o categoría</span></div>`;
      return;
    }
    el.innerHTML = list.map(d => `
      <div class="med-card-full fade-up">
        <div class="med-img">${MEDICINE_EMOJIS[d.tipo]||MEDICINE_EMOJIS.default}</div>
        <div class="med-info">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <h3>${d.nombre}</h3>
            <span class="med-qty">${d.cantidad} un.</span>
          </div>
          <p>${d.tipo}</p>
          <div class="med-location">
            <svg xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
            ${d.donante || 'Donante anónimo'}
          </div>
          <div style="margin-top:10px">
            <button class="btn-detail" onclick='showDetail(${JSON.stringify(d).replace(/'/g,"&#39;")})'>Ver Detalle</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function showDetail(d) {
    const overlay = document.getElementById('detailOverlay');
    const modal = document.getElementById('detailModal');
    const statusMap = { disponible:'badge-success', reservado:'badge-warning', entregado:'badge-blue' };
    modal.innerHTML = `
      <div class="dm-header">
        <div class="dm-icon">${MEDICINE_EMOJIS[d.tipo]||MEDICINE_EMOJIS.default}</div>
        <div>
          <h2>${d.nombre}</h2>
          <div class="dm-type">${d.tipo}</div>
        </div>
      </div>
      <div class="detail-row"><span>Cantidad</span><span>${d.cantidad} unidades</span></div>
      <div class="detail-row"><span>Vencimiento</span><span>${d.fecha_vencimiento}</span></div>
      <div class="detail-row"><span>Donante</span><span>${d.donante || 'Anónimo'}</span></div>
      <div class="detail-row"><span>Estado</span><span><span class="badge ${statusMap[d.estado]||'badge-blue'}">${d.estado}</span></span></div>
      <div class="dm-actions">
        <button class="btn-secondary" onclick="closeDetail()" style="flex:1">Cerrar</button>
        ${d.estado === 'disponible' ? `<button class="btn-primary" onclick="reservar('${d.id}')" style="flex:1">Reservar</button>` : ''}
      </div>
    `;
    overlay.classList.add('show');
  }

  function closeDetail() {
    document.getElementById('detailOverlay').classList.remove('show');
  }

  async function reservar(id) {
    const ok = await mediConnect.updateDonationStatus(id, 'reservado');
    if (ok) {
      showToast('¡Medicamento reservado!', 'success');
      closeDetail();
      load();
    } else {
      showToast('Error al reservar', 'error');
    }
  }

  document.getElementById('detailOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeDetail();
  });

  async function load() {
    const user = mediConnect.getUser();
    if (!user) { location.href = 'index.html'; return; }
    allDonations = await mediConnect.getDonations();
    filterMeds();
  }

  load();
</script>
</body>
</html>
