<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediConnect – Inicio</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .dashboard-header {
      background: linear-gradient(160deg, #1e40af 0%, #3B82F6 80%);
      padding: 48px 24px 70px;
      position: relative;
      overflow: hidden;
    }
    .dashboard-header::before {
      content: '';
      position: absolute;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.07);
      border-radius: 50%;
      bottom: -60px; right: -40px;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-greeting h2 {
      font-family: var(--font-title);
      font-size: 22px;
      font-weight: 700;
      color: white;
    }
    .header-greeting p { font-size: 13px; color: rgba(255,255,255,0.78); margin-top: 2px; }
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: white;
      overflow: hidden;
      cursor: pointer;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Stats */
    .stats-section {
      padding: 0 16px;
      margin-top: -42px;
      position: relative; z-index: 5;
    }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
      box-shadow: var(--shadow-md);
    }
    .stat-icon { font-size: 22px; margin-bottom: 6px; }
    .stat-num {
      font-family: var(--font-title);
      font-size: 22px;
      font-weight: 800;
      color: var(--gray-800);
      line-height: 1;
    }
    .stat-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px; }

    /* Content */
    .dash-content { padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

    /* Activity */
    .activity-list { display: flex; flex-direction: column; gap: 10px; }

    .med-card .med-badge-wrap { margin-left: auto; }

    /* Invite Banner */
    .invite-banner {
      background: linear-gradient(135deg, #2563EB 0%, #4f46e5 100%);
      border-radius: var(--radius);
      padding: 20px;
      color: white;
    }
    .invite-banner h3 { font-size: 18px; font-weight: 800; margin-bottom: 4px; font-family: var(--font-title); }
    .invite-banner p { font-size: 13px; color: rgba(255,255,255,0.85); margin-bottom: 14px; }
    .btn-invite {
      background: rgba(255,255,255,0.2);
      border: 1.5px solid rgba(255,255,255,0.4);
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: var(--font-main);
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }
    .btn-invite:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="dashboard-header fade-up">
    <div class="header-top">
      <div class="header-greeting">
        <h2 id="greeting">Hola, ...</h2>
        <p>Gracias por tu generosidad.</p>
      </div>
      <div class="avatar" id="avatarEl" onclick="location.href='perfil.html'">
        <span id="avatarLetter">?</span>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-section fade-up delay-1">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-num" id="statDonaciones">–</div>
        <div class="stat-label">Donaciones</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="color:var(--success)">✅</div>
        <div class="stat-num" id="statEntregados">–</div>
        <div class="stat-label">Entregados</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏳</div>
        <div class="stat-num" id="statProceso">–</div>
        <div class="stat-label">En Proceso</div>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="dash-content">

    <!-- Actividad Reciente -->
    <div class="fade-up delay-2">
      <div class="section-header">
        <h2>Actividad Reciente</h2>
        <a href="buscar.html">Ver todo</a>
      </div>
      <div class="activity-list" id="activityList">
        <!-- Skeleton -->
        <div class="med-card">
          <div class="med-img skeleton" style="width:60px;height:60px;"></div>
          <div class="med-info" style="flex:1">
            <div class="skeleton" style="height:14px;width:70%;margin-bottom:6px;"></div>
            <div class="skeleton" style="height:11px;width:45%;"></div>
          </div>
        </div>
        <div class="med-card">
          <div class="med-img skeleton" style="width:60px;height:60px;"></div>
          <div class="med-info" style="flex:1">
            <div class="skeleton" style="height:14px;width:60%;margin-bottom:6px;"></div>
            <div class="skeleton" style="height:11px;width:40%;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Invite Banner -->
    <div class="invite-banner fade-up delay-3">
      <h3>¡Invita a un amigo!</h3>
      <p>Ayuda a crecer nuestra red de donantes.</p>
      <button class="btn-invite" onclick="shareApp()">Compartir App</button>
    </div>

  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item active">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
    Inicio
  </a>
  <a href="buscar.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803a7.5 7.5 0 0010.607 0z"/></svg>
    Buscar
  </a>
  <button class="nav-btn-center" onclick="location.href='donar.html'">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
  </button>
  <a href="perfil.html" class="nav-item">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
    Perfil
  </a>
</nav>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
<script>
  const MEDICINE_EMOJIS = { 'Antibiótico':'💊', 'Antiinflamatorio':'🩹', 'Antidiabético':'💉', 'Analgésico':'🔴', 'default':'💊' };
  const STATUS_MAP = { 'disponible': 'badge-success', 'reservado': 'badge-warning', 'entregado': 'badge-blue' };

  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + type; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function shareApp() {
    if (navigator.share) {
      navigator.share({ title: 'MediConnect', text: '¡Únete a MediConnect y ayuda a conectar donaciones de medicamentos!', url: window.location.origin });
    } else {
      navigator.clipboard.writeText(window.location.origin).then(() => showToast('Enlace copiado', 'success'));
    }
  }

  async function loadDashboard() {
    const user = mediConnect.getUser();
    if (!user) { location.href = 'index.html'; return; }

    document.getElementById('greeting').textContent = 'Hola, ' + user.nombre;
    document.getElementById('avatarLetter').textContent = user.nombre.charAt(0).toUpperCase();

    const donations = await mediConnect.getDonations();
    const mine = donations.filter(d => d.donante === user.nombre);
    const entregados = mine.filter(d => d.estado === 'entregado').length;
    const proceso = mine.filter(d => d.estado === 'reservado').length;

    document.getElementById('statDonaciones').textContent = mine.length;
    document.getElementById('statEntregados').textContent = entregados;
    document.getElementById('statProceso').textContent = proceso;

    const list = document.getElementById('activityList');
    const recent = donations.slice(0, 4);
    if (recent.length === 0) {
      list.innerHTML = '<p style="color:var(--gray-400);text-align:center;padding:20px 0;font-size:14px;">No hay actividad reciente</p>';
      return;
    }
    list.innerHTML = recent.map(d => `
      <div class="med-card" onclick="location.href='buscar.html'">
        <div class="med-img">${MEDICINE_EMOJIS[d.tipo] || MEDICINE_EMOJIS.default}</div>
        <div class="med-info">
          <h3>${d.nombre}</h3>
          <p>${d.tipo} · ${d.cantidad} un.</p>
          <div class="med-meta">
            <svg xmlns="http://www.w3.org/2000/svg" style="width:12px;height:12px" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Vence: ${d.fecha_vencimiento}
          </div>
        </div>
        <div class="med-badge-wrap">
          <span class="badge ${STATUS_MAP[d.estado] || 'badge-blue'}">${d.estado}</span>
        </div>
      </div>
    `).join('');
  }

  loadDashboard();
</script>
</body>
</html>
