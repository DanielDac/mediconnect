<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediConnect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">
    💊
  </div>

  <h1>MediConnect</h1>
  <p class="subtitle">Conectando salud, salvando vidas</p>

  <!-- CARD -->
  <div class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active">Iniciar Sesión</button>
      <button class="tab">Registrarse</button>
    </div>

    <!-- ROLES -->
    <div class="roles">
      <button class="role active">💙 Donante</button>
      <button class="role">👤 Receptor</button>
      <button class="role">🛡️ Validador</button>
    </div>

    <!-- FORM -->
    <input type="text" placeholder="Nombre completo">
    <input type="email" placeholder="Correo electrónico">
    <input type="password" placeholder="Contraseña">

    <button class="btn-primary">Ingresar</button>

  </div>

  <footer>
    © 2026 MediConnect. Protegemos tus datos.
  </footer>

</div>

</body>
</html>
