<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediConnect – Inicio</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--white);
    }

    .auth-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 0 40px 0;
    }

    /* Hero */
    .auth-hero {
      background: linear-gradient(160deg, #1e40af 0%, #3B82F6 60%, #60A5FA 100%);
      padding: 48px 24px 56px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .auth-hero::before {
      content: '';
      position: absolute;
      width: 260px;
      height: 260px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      bottom: -80px;
      right: -60px;
    }

    .auth-hero::after {
      content: '';
      position: absolute;
      width: 140px;
      height: 140px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 50%;
      top: -30px;
      left: -30px;
    }

    .logo-icon {
      width: 70px;
      height: 70px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      position: relative;
      z-index: 1;
    }

    .logo-icon svg {
      width: 36px;
      height: 36px;
      color: white;
    }

    .auth-hero h1 {
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
      position: relative;
      z-index: 1;
    }

    .auth-hero p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.82);
      position: relative;
      z-index: 1;
    }

    /* Card Container */
    .auth-card {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      margin-top: -20px;
      padding: 28px 24px;
      flex: 1;
      position: relative;
      z-index: 2;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.07);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--gray-100);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-main);
      color: var(--gray-400);
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--white);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    /* Role Selector */
    .role-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-600);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-btn {
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px 8px;
      background: var(--white);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-main);
      color: var(--gray-600);
      transition: all 0.2s;
    }

    .role-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    .role-btn svg {
      width: 22px;
      height: 22px;
    }

    .role-btn.active svg {
      stroke: var(--primary);
    }

    .form-section {
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .form-section.visible {
      display: flex;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="auth-page page-no-nav">
    <!-- Hero -->
    <div class="auth-hero fade-up">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9 12h3m0 0h3m-3 0V9m0 3v3M4.5 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15A2.25 2.25 0 002.25 6.75v10.5A2.25 2.25 0 004.5 19.5z" />
        </svg>
      </div>
      <h1>MediConnect</h1>
      <p>Conectando salud, salvando vidas.</p>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs fade-up delay-1">
        <button class="auth-tab active" onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="auth-tab" onclick="switchTab('register')">Registrarse</button>
      </div>

      <!-- Role Selector (shared) -->
      <div class="fade-up delay-2">
        <p class="role-label">Rol</p>
        <div class="role-grid">
          <button class="role-btn active" onclick="selectRole(this, 'donante')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
            Donante
          </button>
          <button class="role-btn" onclick="selectRole(this, 'receptor')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
            Receptor
          </button>
          <button class="role-btn" onclick="selectRole(this, 'validador')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
            Validador
          </button>
        </div>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-section visible fade-up delay-3" id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            <input class="input-field" type="email" id="loginEmail" placeholder="correo@ejemplo.com" />
          </div>
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <input class="input-field" type="password" id="loginPassword" placeholder="Tu contraseña" />
          </div>
        </div>
        <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Ingresar</button>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-section" id="registerForm">
        <div class="input-group">
          <label>Nombre Completo</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
            <input class="input-field" type="text" id="regName" placeholder="Ej. Juan Pérez" />
          </div>
        </div>
        <div class="input-group">
          <label>Email</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            <input class="input-field" type="email" id="regEmail" placeholder="correo@ejemplo.com" />
          </div>
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <input class="input-field" type="password" id="regPassword" placeholder="Mínimo 6 caracteres" />
          </div>
        </div>
        <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Crear Cuenta</button>
      </div>

      <p class="footer-text">© 2026 MediConnect. Protegemos tus datos.</p>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
  <script>
    let selectedRole = 'donante';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
      document.getElementById('loginForm').classList.toggle('visible', tab === 'login');
      document.getElementById('registerForm').classList.toggle('visible', tab === 'register');
    }

    function selectRole(el, role) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      selectedRole = role;
    }

    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading ? '<span class="spinner"></span>' : btn.dataset.label;
    }

    document.getElementById('loginBtn').dataset.label = 'Ingresar';
    document.getElementById('registerBtn').dataset.label = 'Crear Cuenta';

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) { showToast('Ingresa tu email y contraseña', 'error'); return; }

      setLoading('loginBtn', true);
      try {
        const ok = await mediConnect.login(email, password, selectedRole);
        if (ok) { showToast('¡Bienvenido de nuevo!', 'success'); setTimeout(() => location.href = 'dashboard.html', 900); }
        else { showToast('Credenciales incorrectas', 'error'); }
      } catch (e) { showToast('Error al ingresar', 'error'); }
      setLoading('loginBtn', false);
    }

    async function handleRegister() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const pass = document.getElementById('regPassword').value;
      if (!name || !email || !pass) { showToast('Completa todos los campos', 'error'); return; }
      if (pass.length < 6) { showToast('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
      setLoading('registerBtn', true);
      try {
        const ok = await mediConnect.register(name, email, pass, selectedRole);
        if (ok) { showToast('¡Cuenta creada exitosamente!', 'success'); setTimeout(() => location.href = 'dashboard.html', 900); }
        else { showToast('Error al crear cuenta', 'error'); }
      } catch (e) { showToast('Error al registrarse', 'error'); }
      setLoading('registerBtn', false);
    }
  </script>
</body>

</html>
