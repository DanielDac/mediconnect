<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediConnect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <div class="logo">💊</div>
  <h1>MediConnect</h1>
  <p class="subtitle">Conectando salud, salvando vidas.</p>

  <div class="card">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab" id="loginTab">Iniciar Sesión</button>
      <button class="tab active" id="registerTab">Registrarse</button>
    </div>

    <!-- ROLES -->
    <div class="roles">
      <button class="role active" data-role="donante">💙 Donante</button>
      <button class="role" data-role="receptor">👤 Receptor</button>
      <button class="role" data-role="validador">🛡️ Validador</button>
    </div>

    <!-- FORM -->
    <form id="form">

      <input type="text" id="name" placeholder="Nombre completo">

      <input type="email" id="email" placeholder="Correo electrónico">

      <input type="password" id="password" placeholder="Contraseña">

      <button type="submit" id="submitBtn">Crear Cuenta</button>

    </form>

  </div>

  <footer>© 2026 MediConnect. Protegemos tus datos.</footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
